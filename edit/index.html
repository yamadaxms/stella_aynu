<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>アイヌ民族星文化ビューア ～カムイの星図～ データ編集画面</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow" />

    <link rel="stylesheet" href="edit.css?v=v057a" />
    <script src="config.js?v=v057a"></script>
    <script src="editAdmin.js?v=v057a" defer></script>
  </head>
  <body>
    <header class="edit-header">
      <div class="edit-title-block">
        <h1>アイヌ民族星文化ビューア ～カムイの星図～ データ編集画面</h1>
        <p class="edit-kicker">管理画面</p>
      </div>
      <div class="edit-session">
        <span id="session-user" class="session-user">未ログイン</span>
        <button id="login-button" class="button button-primary" type="button">ログイン</button>
        <button id="logout-button" class="button" type="button" hidden>ログアウト</button>
      </div>
    </header>

    <main class="edit-main">
      <section id="auth-panel" class="auth-panel" aria-labelledby="auth-heading">
        <div>
          <h2 id="auth-heading">編集者ログイン</h2>
          <p id="auth-message" class="auth-message">ログイン後に編集画面を表示します。</p>
        </div>
      </section>

      <section id="app-panel" class="edit-workspace" aria-label="データ編集" hidden>
        <aside class="edit-sidebar">
          <nav id="table-nav" class="table-nav" aria-label="編集対象テーブル"></nav>
        </aside>

        <section class="list-panel" aria-labelledby="list-heading">
          <div class="panel-header">
            <div>
              <h2 id="list-heading">伝承リスト</h2>
            </div>
            <div class="toolbar">
              <button id="new-row-button" class="button button-primary" type="button">新規追加</button>
              <button id="reload-button" class="button" type="button">再読み込み</button>
            </div>
          </div>

          <form id="search-form" class="search-form">
            <label class="search-field">
              <span>検索</span>
              <input id="search-input" type="search" autocomplete="off" />
            </label>
            <button id="clear-search-button" class="button button-muted" type="button">クリア</button>
          </form>

          <div class="status-row">
            <p id="row-count" class="row-count" aria-live="polite">0件</p>
            <p id="list-loading" class="loading-text" aria-live="polite" hidden>読み込み中</p>
          </div>
          <div id="status-message" class="status-message" role="alert" aria-live="assertive" hidden></div>

          <div id="table-wrap" class="table-wrap">
            <table class="data-table">
              <thead id="data-head"></thead>
              <tbody id="data-body"></tbody>
            </table>
          </div>
          <p id="empty-message" class="empty-message" hidden>表示できる行がありません。</p>
        </section>

        <aside class="editor-panel" aria-labelledby="editor-heading">
          <div class="panel-header editor-header">
            <div>
              <p id="editor-mode" class="table-key">未選択</p>
              <h2 id="editor-heading">編集</h2>
            </div>
          </div>

          <form id="editor-form" class="editor-form" autocomplete="off">
            <div id="editor-fields" class="editor-fields"></div>
            <div class="editor-actions">
              <button id="save-button" class="button button-primary" type="submit" disabled>保存</button>
              <button id="delete-button" class="button button-danger" type="button" disabled>削除</button>
              <button id="cancel-button" class="button button-muted" type="button" disabled>キャンセル</button>
            </div>
          </form>
        </aside>
      </section>
    </main>
  </body>
</html>
