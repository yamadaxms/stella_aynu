<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>アイヌ民族星文化ビューア ～カムイの星図～</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/starCulture.css?v=v061a" />
  </head>
  <body>
    <div id="site-header-include"></div>

    <main class="star-culture-page star-culture-detail-page">
      <header class="star-culture-page-header">
        <div>
          <h2>星文化データベース</h2>
        </div>
        <a class="star-culture-back-link" href="star-cultures.html">検索へ戻る</a>
      </header>

      <div id="star-culture-loading" class="star-culture-loading" aria-live="polite" hidden>データを読み込んでいます。</div>
      <div id="star-culture-status" class="star-culture-status" role="alert" aria-live="assertive" hidden></div>

      <article id="star-culture-detail" class="star-culture-detail" hidden>
        <section class="star-culture-panel" aria-labelledby="star-culture-basic-heading">
          <div class="star-culture-section-header">
            <h3 id="star-culture-basic-heading">基本情報</h3>
          </div>
          <div class="star-culture-table-wrap">
            <table class="star-culture-detail-table">
              <tbody id="star-culture-basic"></tbody>
            </table>
          </div>
        </section>

        <section class="star-culture-panel" aria-labelledby="star-culture-related-heading">
          <div class="star-culture-section-header">
            <h3 id="star-culture-related-heading">関連情報</h3>
          </div>

          <div class="star-culture-tabs" role="tablist" aria-label="星文化関連情報">
            <button id="star-culture-tab-astro" class="star-culture-tab" type="button" role="tab" aria-selected="true" aria-controls="star-culture-panel-astro">関連天体</button>
            <button id="star-culture-tab-source" class="star-culture-tab" type="button" role="tab" aria-selected="false" aria-controls="star-culture-panel-source" tabindex="-1">出展</button>
            <button id="star-culture-tab-tradition" class="star-culture-tab" type="button" role="tab" aria-selected="false" aria-controls="star-culture-panel-tradition" tabindex="-1">伝承</button>
            <button id="star-culture-tab-area" class="star-culture-tab" type="button" role="tab" aria-selected="false" aria-controls="star-culture-panel-area" tabindex="-1">伝承地域</button>
            <button id="star-culture-tab-word" class="star-culture-tab" type="button" role="tab" aria-selected="false" aria-controls="star-culture-panel-word" tabindex="-1">名称詳細</button>
          </div>

          <div id="star-culture-panel-astro" class="star-culture-tab-panel" role="tabpanel" aria-labelledby="star-culture-tab-astro">
            <div id="star-culture-astro"></div>
          </div>
          <div id="star-culture-panel-source" class="star-culture-tab-panel" role="tabpanel" aria-labelledby="star-culture-tab-source" hidden>
            <div id="star-culture-source"></div>
          </div>
          <div id="star-culture-panel-tradition" class="star-culture-tab-panel" role="tabpanel" aria-labelledby="star-culture-tab-tradition" hidden>
            <div id="star-culture-tradition"></div>
          </div>
          <div id="star-culture-panel-area" class="star-culture-tab-panel" role="tabpanel" aria-labelledby="star-culture-tab-area" hidden>
            <div id="star-culture-area"></div>
          </div>
          <div id="star-culture-panel-word" class="star-culture-tab-panel" role="tabpanel" aria-labelledby="star-culture-tab-word" hidden>
            <div id="star-culture-word"></div>
          </div>
        </section>
      </article>
    </main>

    <script src="js/config.js?v=v061a"></script>
    <script src="js/dataLoader.js?v=v061a"></script>
    <script src="js/starCultureDetail.js?v=v061a"></script>
    <script src="js/includes.js?v=v061a"></script>
    <script src="js/contentProtection.js?v=v061a"></script>
  </body>
</html>
