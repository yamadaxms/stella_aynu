<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>星文化検索 | アイヌ民族星文化ビューア</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/starCulture.css?v=20260515" />
  </head>
  <body>
    <div id="site-header-include"></div>

    <main class="star-culture-page">
      <header class="star-culture-page-header">
        <div>
          <p class="star-culture-kicker">管理系ページ</p>
          <h2>星文化検索</h2>
        </div>
        <a class="star-culture-back-link" href="index.html">星図ビューへ戻る</a>
      </header>

      <section class="star-culture-panel" aria-labelledby="star-culture-search-heading">
        <h3 id="star-culture-search-heading">検索条件</h3>
        <div class="star-culture-search-grid">
          <div class="star-culture-field">
            <label for="star-culture-query">名称・意味・英字表記・関連天体</label>
            <input id="star-culture-query" type="search" autocomplete="off" />
          </div>
          <div class="star-culture-field">
            <label for="star-culture-region">伝承地域</label>
            <select id="star-culture-region">
              <option value="">すべて</option>
              <option value="aynu1">区分Ⅰ</option>
              <option value="aynu2">区分Ⅱ</option>
              <option value="aynu3">区分Ⅲ</option>
              <option value="aynu4">区分Ⅳ</option>
              <option value="aynu5">区分Ⅴ</option>
            </select>
          </div>
          <div class="star-culture-actions">
            <button id="star-culture-reset" type="button">クリア</button>
          </div>
        </div>
      </section>

      <section class="star-culture-panel" aria-labelledby="star-culture-results-heading">
        <div class="star-culture-section-header">
          <h3 id="star-culture-results-heading">検索結果</h3>
          <p id="star-culture-result-count" class="star-culture-result-count" aria-live="polite">0件</p>
        </div>

        <div id="star-culture-loading" class="star-culture-loading" aria-live="polite" hidden>データを読み込んでいます。</div>
        <div id="star-culture-status" class="star-culture-status" role="alert" aria-live="assertive" hidden></div>
        <div id="star-culture-empty" class="star-culture-empty" hidden>該当する星文化情報はありません。</div>

        <div id="star-culture-table-wrap" class="star-culture-table-wrap" hidden>
          <table class="star-culture-table">
            <thead>
              <tr>
                <th scope="col">名称</th>
                <th scope="col">意味</th>
                <th scope="col">英字表記</th>
                <th scope="col">関連天体</th>
                <th scope="col">伝承地域</th>
                <th scope="col">詳細</th>
              </tr>
            </thead>
            <tbody id="star-culture-results"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="js/dataLoader.js?v=20260501"></script>
    <script src="js/starCultureList.js?v=20260515a"></script>
    <script src="js/includes.js?v=20260214"></script>
    <script src="js/contentProtection.js?v=20260214"></script>
  </body>
</html>
