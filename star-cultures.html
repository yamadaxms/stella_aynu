<!doctype html>
<html lang="ja" class="star-culture-list-root">
  <head>
    <meta charset="UTF-8" />
    <title>アイヌ民族星文化ビューア ～カムイの星図～</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/starCulture.css?v=v057a" />
  </head>
  <body class="star-culture-list-body">
    <div id="site-header-include"></div>

    <main class="star-culture-page">
      <header class="star-culture-page-header">
        <div>
          <h2>星文化データベース</h2>
        </div>
        <a class="star-culture-back-link" href="index.html">星図ビューへ戻る</a>
      </header>

      <section class="star-culture-panel" aria-labelledby="star-culture-search-heading">
        <h3 id="star-culture-search-heading">検索条件</h3>
        <div class="star-culture-search-grid">
          <div class="star-culture-field">
            <label for="star-culture-query">名称・名称（英字）・意味・関連天体</label>
            <input id="star-culture-query" type="search" autocomplete="off" />
          </div>
          <fieldset class="star-culture-region-filter">
            <legend>伝承地域</legend>
            <label><input type="checkbox" name="star-culture-region" value="aynu1" />区分Ⅰ</label>
            <label><input type="checkbox" name="star-culture-region" value="aynu2" />区分Ⅱ</label>
            <label><input type="checkbox" name="star-culture-region" value="aynu3" />区分Ⅲ</label>
            <label><input type="checkbox" name="star-culture-region" value="aynu4" />区分Ⅳ</label>
            <label><input type="checkbox" name="star-culture-region" value="aynu5" />区分Ⅴ</label>
            <label><input type="checkbox" name="star-culture-region" value="other" />その他</label>
          </fieldset>
          <div class="star-culture-actions">
            <button id="star-culture-reset" type="button">クリア</button>
          </div>
        </div>
      </section>

      <section class="star-culture-panel" aria-labelledby="star-culture-results-heading">
        <div class="star-culture-section-header">
          <h3 id="star-culture-results-heading">検索結果</h3>
          <p id="star-culture-result-count" class="star-culture-result-count" aria-live="polite">0件</p>
        </div>

        <div id="star-culture-loading" class="star-culture-loading" aria-live="polite" hidden>データを読み込んでいます。</div>
        <div id="star-culture-status" class="star-culture-status" role="alert" aria-live="assertive" hidden></div>
        <div id="star-culture-empty" class="star-culture-empty" hidden>該当する星文化情報はありません。</div>

        <div id="star-culture-table-wrap" class="star-culture-table-wrap" hidden>
          <table class="star-culture-table">
            <thead>
              <tr>
                <th scope="col" data-sort-column="detail" aria-sort="none"><button class="star-culture-sort-button" type="button">詳細</button></th>
                <th scope="col" data-sort-column="name" aria-sort="ascending"><button class="star-culture-sort-button" type="button">名称</button></th>
                <th scope="col" data-sort-column="nameEn" aria-sort="none"><button class="star-culture-sort-button" type="button">名称（英字）</button></th>
                <th scope="col" data-sort-column="description" aria-sort="none"><button class="star-culture-sort-button" type="button">意味</button></th>
                <th scope="col" data-sort-column="astro" aria-sort="none"><button class="star-culture-sort-button" type="button">関連天体</button></th>
                <th scope="col" data-sort-column="aynu1" aria-sort="none"><button class="star-culture-sort-button" type="button">区分Ⅰ</button></th>
                <th scope="col" data-sort-column="aynu2" aria-sort="none"><button class="star-culture-sort-button" type="button">区分Ⅱ</button></th>
                <th scope="col" data-sort-column="aynu3" aria-sort="none"><button class="star-culture-sort-button" type="button">区分Ⅲ</button></th>
                <th scope="col" data-sort-column="aynu4" aria-sort="none"><button class="star-culture-sort-button" type="button">区分Ⅳ</button></th>
                <th scope="col" data-sort-column="aynu5" aria-sort="none"><button class="star-culture-sort-button" type="button">区分Ⅴ</button></th>
                <th scope="col" data-sort-column="other" aria-sort="none"><button class="star-culture-sort-button" type="button">その他</button></th>
                <th scope="col" data-sort-column="chart" aria-sort="none"><button class="star-culture-sort-button" type="button">星図表示</button></th>
              </tr>
            </thead>
            <tbody id="star-culture-results"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="js/dataLoader.js?v=v057a"></script>
    <script src="js/starCultureList.js?v=v057a"></script>
    <script src="js/includes.js?v=v057a"></script>
    <script src="js/contentProtection.js?v=v057a"></script>
  </body>
</html>
